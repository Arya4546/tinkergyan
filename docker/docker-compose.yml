version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: Tinkergyan
      POSTGRES_USER: Tinkergyan
      POSTGRES_PASSWORD: Tinkergyan_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://Tinkergyan:Tinkergyan_dev@postgres:5432/Tinkergyan
      REDIS_URL: redis://redis:6379
      JWT_SECRET: super_secret_dev_jwt_key_that_is_at_least_32_chars_long
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis
    volumes:
      - ../apps/api:/app
      - /app/node_modules

  web:
    build:
      context: ../apps/web
    environment:
      VITE_API_URL: http://localhost:3001
    ports:
      - "5173:5173"
    volumes:
      - ../apps/web:/app
      - /app/node_modules

volumes:
  postgres_data:
